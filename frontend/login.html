<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUVISUAL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="pagina-form">

    <!-- Formulário de login -->
    <main class="form-box">
        <a class="voltar" href="landing-page.html">Voltar para início</a>

        <h1>Login</h1>
        <p>Entre para conversar com a assistente do salão.</p>

        <form id="formLogin">

            <input
                type="email"
                id="email"
                placeholder="Email"
                required
            >

            <input
                type="password"
                id="senha"
                placeholder="Senha"
                required
            >

            <button type="submit">
                Entrar
            </button>

        </form>

        <p class="texto-link">
            Ainda não tem conta?
            <a href="cadastro.html">Cadastrar</a>
        </p>
    </main>

    <script src="login.js"></script>

</body>
</html>
