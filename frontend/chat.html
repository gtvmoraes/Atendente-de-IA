<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUVISUAL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="pagina-chat">

    <!-- Chat da assistente -->
    <main class="chat-box">

           <button id="sair">Sair</button>
        <h1>Assistente DUVISUAL</h1>
        <p>Digite sua dúvida sobre serviços, horários ou atendimento.</p>

        <div class="linha-chat">
            <input
                type="text"
                id="mensagem"
                placeholder="Digite sua mensagem"
            >

            <button id="enviar">
                Enviar
            </button>
        </div>

        <p id="resposta"></p>
    </main>

 


    <script src="chat.js"></script>

</body>
</html>
